<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iron Will</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="circle">
      <div class="time-display">
        <div id="days" class="days">0 days</div>
        <div id="hms" class="hms">00:00:00</div>
        <div class="rank-badge" id="rankBadge">Novice</div>
      </div>
      <svg class="progress" viewBox="0 0 200 200">
        <defs>
          <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#21f373;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#64ffda;stop-opacity:1" />
          </linearGradient>
        </defs>
        <circle class="bg" cx="100" cy="100" r="90"></circle>
        <circle class="fg" cx="100" cy="100" r="90"></circle>
      </svg>
    </div>

    <div class="progress-text" id="progressText">Keep going strong!</div>

    <button id="resetBtn" class="reset-btn">⟲</button>

    <blockquote class="quote" id="quoteDisplay">
      "Strength does not come from physical capacity.
      It comes from an indomitable will."
      <footer>- Mahatma Gandhi</footer>
    </blockquote>

    <div class="bottom-buttons">
      <button id="rankBtn">My Rank</button>
      <button id="historyBtn">History</button>
    </div>
  </div>

  <!-- ===== Start Date Picker Panel (corner) ===== -->
  <div class="date-picker-corner" id="datePickerCorner">
    <!-- Toggle button -->
    <button class="date-toggle-btn" id="dateToggleBtn" title="Set Start Date">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
        <line x1="16" y1="2" x2="16" y2="6"></line>
        <line x1="8" y1="2" x2="8" y2="6"></line>
        <line x1="3" y1="10" x2="21" y2="10"></line>
      </svg>
    </button>

    <!-- Expandable panel -->
    <div class="date-panel" id="datePanel">
      <div class="date-panel-header">
        <span class="date-panel-title">📅 Start Date</span>
        <button class="date-panel-close" id="datePanelClose">✕</button>
      </div>
      <p class="date-panel-hint">Set when your streak began</p>
      <input
        type="datetime-local"
        id="startDateInput"
        class="date-input"
      />
      <button id="setStartDateBtn" class="set-date-btn">Set Start Date</button>
      <div class="current-start-label" id="currentStartLabel">
        Current: <span id="currentStartText">—</span>
      </div>
    </div>
  </div>

  <!-- Rank Modal -->
  <div id="rankModal" class="modal">
    <div class="modal-content">
      <span id="closeRank" class="close">&times;</span>
      <h2>Rank List</h2>
      <ul id="rankList"></ul>
    </div>
  </div>

  <!-- History Modal -->
  <div id="historyModal" class="modal">
    <div class="modal-content">
      <span id="closeHistory" class="close">&times;</span>
      <h2>History</h2>
      <ul id="historyList"></ul>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
